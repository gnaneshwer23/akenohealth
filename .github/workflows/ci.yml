name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx
          pip install -r services/l0-l2-ingestion/requirements.txt
          pip install -r services/identity-consent/requirements.txt
          pip install -r services/l3-l4-ai-safety/requirements.txt

      - name: Compile Python modules
        run: |
          python -m compileall services/l0-l2-ingestion/app services/identity-consent/app services/l3-l4-ai-safety/app services/l7-federated/app

      - name: Run unit tests
        run: pytest -q

      - name: Validate docker compose
        run: docker compose -f infra/docker-compose.yml config
